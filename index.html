<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Flashcard luyện ngữ pháp đồng nghĩa TOPIK II">
  <title>TOPIK II - Ngữ Pháp Đồng Nghĩa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- HEADER -->
  <header id="app-header">
    <div class="header-left">
      <h1>📚 TOPIK II Grammar</h1>
    </div>
    <div class="header-center">
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">0 / 0</span>
      </div>
    </div>
    <div class="header-right">
      <div class="header-settings" id="headerSettings">
        <label class="toggle-wrap" title="Hiện chủ đề (nhóm ngữ pháp)">
          <input type="checkbox" id="toggleTopic" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-label">Hiện CĐ</span>
        </label>
        <label class="toggle-wrap" title="Hiện đáp án ngay khi chọn sai">
          <input type="checkbox" id="toggleReveal" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-label">Hiện ĐA</span>
        </label>
      </div>
      <button class="btn-icon btn-star-mode" id="btnStarMode" title="Chế độ ôn sao">⭐ <span id="starModeLabel">Ôn
          sao</span></button>
      <button class="btn-icon" id="btnStarList" title="Danh sách đã đánh sao">☆ <span id="starCount">0</span></button>
      <button class="btn-icon" id="btnGrammarList" title="Danh sách ngữ pháp">📋</button>
      <button class="btn-icon mobile-only" id="btnSettings" title="Cài đặt">⚙️</button>
      <button class="btn-icon pc-only" id="btnHelp" title="Hướng dẫn sử dụng">❔</button>
      <button class="btn-icon pc-only" id="btnReset" title="Reset tiến trình">🔄</button>
    </div>
  </header>

  <!-- MAIN CARD AREA -->
  <main id="app-main">
    <div class="star-mode-banner" id="starModeBanner">⭐ Chế độ ôn sao</div>
    <!-- Card A - Main grammar -->
    <div class="card-a-wrap">
      <div class="card card-a" id="cardA">
        <div class="card-inner">
          <div class="card-front">
            <button class="btn-copy copy-btn-a" title="Copy ngữ pháp">📋</button>
            <button class="btn-star-card" id="btnStarA" title="Đánh dấu sao">☆</button>
            <span class="card-label">Ngữ pháp</span>
            <span class="card-grammar" id="mainGrammar"></span>
            <span class="card-hint">Click để xem nghĩa</span>
          </div>
          <div class="card-back">
            <button class="btn-copy copy-btn-a-back" title="Copy nghĩa tiếng Việt">📋</button>
            <span class="card-label">Nghĩa tiếng Việt</span>
            <span class="card-meaning" id="mainMeaning"></span>
            <span class="card-notes" id="mainNotes"></span>
          </div>
        </div>
      </div>
      <div class="card-a-buttons">
        <button class="btn-side btn-c" id="btnSynA"
          title="Ngữ pháp đồng nghĩa"><span>Đồng</span><span>nghĩa</span></button>
        <button class="btn-side btn-d" id="btnExA" title="Câu mẫu"><span>Câu</span><span>mẫu</span></button>
      </div>
    </div>

    <div class="sense-badge" id="senseBadge"></div>

    <!-- 4 Option Cards (B1-B4) -->
    <div class="options-grid">
      <div class="option-wrap" data-idx="0">
        <div class="card card-b" id="cardB0">
          <div class="card-inner">
            <div class="card-front"><button class="btn-copy copy-btn-b" data-idx="0"
                title="Copy ngữ pháp">📋</button><button class="btn-star-card btn-star-opt" data-idx="0"
                title="Đánh dấu sao">☆</button><span class="opt-num">1</span><span class="opt-grammar"
                id="optG0"></span></div>
            <div class="card-back"><span class="opt-meaning" id="optM0"></span></div>
          </div>
        </div>
        <div class="opt-buttons">
          <button class="btn-sm btn-c" data-idx="0" data-type="syn">ĐN</button>
          <button class="btn-sm btn-d" data-idx="0" data-type="ex">VD</button>
        </div>
      </div>
      <div class="option-wrap" data-idx="1">
        <div class="card card-b" id="cardB1">
          <div class="card-inner">
            <div class="card-front"><button class="btn-copy copy-btn-b" data-idx="1"
                title="Copy ngữ pháp">📋</button><button class="btn-star-card btn-star-opt" data-idx="1"
                title="Đánh dấu sao">☆</button><span class="opt-num">2</span><span class="opt-grammar"
                id="optG1"></span></div>
            <div class="card-back"><span class="opt-meaning" id="optM1"></span></div>
          </div>
        </div>
        <div class="opt-buttons">
          <button class="btn-sm btn-c" data-idx="1" data-type="syn">ĐN</button>
          <button class="btn-sm btn-d" data-idx="1" data-type="ex">VD</button>
        </div>
      </div>
      <div class="option-wrap" data-idx="2">
        <div class="card card-b" id="cardB2">
          <div class="card-inner">
            <div class="card-front"><button class="btn-copy copy-btn-b" data-idx="2"
                title="Copy ngữ pháp">📋</button><button class="btn-star-card btn-star-opt" data-idx="2"
                title="Đánh dấu sao">☆</button><span class="opt-num">3</span><span class="opt-grammar"
                id="optG2"></span></div>
            <div class="card-back"><span class="opt-meaning" id="optM2"></span></div>
          </div>
        </div>
        <div class="opt-buttons">
          <button class="btn-sm btn-c" data-idx="2" data-type="syn">ĐN</button>
          <button class="btn-sm btn-d" data-idx="2" data-type="ex">VD</button>
        </div>
      </div>
      <div class="option-wrap" data-idx="3">
        <div class="card card-b" id="cardB3">
          <div class="card-inner">
            <div class="card-front"><button class="btn-copy copy-btn-b" data-idx="3"
                title="Copy ngữ pháp">📋</button><button class="btn-star-card btn-star-opt" data-idx="3"
                title="Đánh dấu sao">☆</button><span class="opt-num">4</span><span class="opt-grammar"
                id="optG3"></span></div>
            <div class="card-back"><span class="opt-meaning" id="optM3"></span></div>
          </div>
        </div>
        <div class="opt-buttons">
          <button class="btn-sm btn-c" data-idx="3" data-type="syn">ĐN</button>
          <button class="btn-sm btn-d" data-idx="3" data-type="ex">VD</button>
        </div>
      </div>
    </div>

    <!-- Next button -->
    <button class="btn-prev" id="btnPrev" style="display: none;">⬅ Quay lại</button>
    <button class="btn-next" id="btnNext">Tiếp theo <span class="key-hint">5</span></button>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Bottom Navigation (Mobile Only) -->
  <nav class="mobile-nav">
    <button class="nav-item" id="navPrev">
      <span class="nav-icon">⬅️</span>
      <span class="nav-text">Lùi</span>
    </button>
    <button class="nav-item" id="navStarList">
      <span class="nav-icon">⭐</span>
      <span class="nav-text">Sao</span>
    </button>
    <button class="nav-item nav-main" id="navNext">
      <span class="nav-icon">➡️</span>
      <span class="nav-text">Tiếp</span>
    </button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
